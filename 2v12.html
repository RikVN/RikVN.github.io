<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nederlandse anagrammen oefenen</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --dark: #111827;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --good: #047857;
      --good-bg: #ecfdf5;
      --bad: #b45309;
      --bad-bg: #fffbeb;
      --danger: #b91c1c;
      --danger-bg: #fef2f2;
      --tile: #111827;
      --tile-disabled: #d1d5db;
      --shadow: 0 18px 45px rgba(15, 23, 42, .10);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #eef2ff 0, var(--bg) 42%, #ffffff 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(980px, calc(100% - 28px));
      margin: 0 auto;
      padding: 34px 0;
    }

    header {
      text-align: center;
      margin-bottom: 24px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .72);
      border-radius: 999px;
      padding: 7px 13px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 54px);
      line-height: 1.02;
      letter-spacing: -0.045em;
    }

    .subtitle {
      max-width: 650px;
      margin: 14px auto 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.55;
    }

    .card {
      background: rgba(255, 255, 255, .92);
      border: 1px solid rgba(229, 231, 235, .9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(18px, 3vw, 32px);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }

    .timerBox {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .timer {
      min-width: 92px;
      text-align: center;
      border-radius: 16px;
      background: #f3f4f6;
      padding: 10px 13px;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: .02em;
    }

    .timer.warning {
      background: var(--danger-bg);
      color: var(--danger);
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      background: var(--accent);
      color: white;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      transition: transform .12s ease, background .12s ease, opacity .12s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      background: var(--accent-dark);
    }

    button.secondary {
      color: var(--text);
      background: #eef2ff;
    }

    button.secondary:hover:not(:disabled) {
      background: #e0e7ff;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .55;
    }

    .section { margin-top: 22px; }

    .label {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .letters {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 8px;
      width: 100%;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .tile {
      aspect-ratio: 1 / 1;
      min-width: 42px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      border: 1px solid transparent;
      font-size: clamp(16px, 2.2vw, 24px);
      font-weight: 950;
      text-transform: uppercase;
      user-select: none;
    }

    .buyTile {
      background: var(--tile);
      color: white;
      box-shadow: 0 8px 16px rgba(17, 24, 39, .18);
      padding: 0;
    }

    .buyTile.used {
      background: var(--tile-disabled);
      color: #6b7280;
      box-shadow: none;
      transform: none !important;
    }

    .answerTile {
      background: white;
      border-color: var(--line);
      color: #cbd5e1;
    }

    .answerTile.revealed {
      background: var(--good-bg);
      border-color: #bbf7d0;
      color: var(--good);
    }

    form {
      display: flex;
      gap: 10px;
      margin-top: 22px;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 13px 14px;
      font: inherit;
      font-size: 18px;
      outline: none;
      background: white;
    }

    input:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 4px rgba(147, 197, 253, .30);
    }

    .message {
      margin-top: 18px;
      border-radius: 16px;
      padding: 14px 16px;
      font-weight: 800;
      line-height: 1.4;
      display: none;
    }

    .message.show { display: block; }
    .message.info { background: var(--bad-bg); color: var(--bad); }
    .message.good { background: var(--good-bg); color: var(--good); }
    .message.danger { background: var(--danger-bg); color: var(--danger); }

    .emptyState {
      border: 2px dashed #d1d5db;
      border-radius: 20px;
      padding: 42px 18px;
      text-align: center;
      color: var(--muted);
      background: rgba(255, 255, 255, .55);
    }

    .emptyState strong { color: var(--text); }

    .hidden { display: none !important; }

    @media (max-width: 720px) {
      main { width: min(100% - 18px, 980px); padding-top: 20px; }
      .letters { gap: 5px; }
      .tile { min-width: 31px; border-radius: 10px; }
      form { flex-direction: column; }
      .topbar { align-items: stretch; }
      .timerBox { width: 100%; justify-content: space-between; }
      .timer { min-width: 86px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="pill">Nederlandse anagrammen</div>
      <h1>2 voor 12 oefenen</h1>
      <p class="subtitle">Klik op een letter om die specifieke letter te kopen.</p>
    </header>

    <section class="card">
      <div class="topbar">
        <button id="newGameBtn" type="button">Nieuw spel</button>
        <div class="timerBox">
          <div id="timer" class="timer">02:00</div>
          <button id="pauseBtn" class="secondary" type="button" disabled>Pauze</button>
        </div>
      </div>

      <div id="emptyState" class="emptyState">
        <strong>Nog geen spel gestart.</strong><br />
        Klik op <strong>Nieuw spel</strong> om de letters en timer te starten.
      </div>

      <div id="gameArea" class="hidden">
        <div class="section">
          <p class="label">Klikbare letters</p>
          <div id="scrambledLetters" class="letters" aria-label="Geschudde letters"></div>
        </div>

        <div class="section">
          <p class="label">Gekochte letters</p>
          <div id="answerSlots" class="letters" aria-label="Antwoordposities"></div>
        </div>

        <form id="guessForm" autocomplete="off">
          <input id="guessInput" type="text" placeholder="Typ je antwoord..." aria-label="Antwoord raden" />
          <button id="guessBtn" type="submit">Gok</button>
        </form>
      </div>

      <div id="message" class="message"></div>
    </section>
  </main>

    const GAME_SECONDS = 120;

    const elements = {
      newGameBtn: document.getElementById("newGameBtn"),
      pauseBtn: document.getElementById("pauseBtn"),
      timer: document.getElementById("timer"),
      emptyState: document.getElementById("emptyState"),
      gameArea: document.getElementById("gameArea"),
      scrambledLetters: document.getElementById("scrambledLetters"),
      answerSlots: document.getElementById("answerSlots"),
      guessForm: document.getElementById("guessForm"),
      guessInput: document.getElementById("guessInput"),
      guessBtn: document.getElementById("guessBtn"),
      message: document.getElementById("message"),
    };

    let game = null;
    let timerId = null;

    function wordToTiles(word) {
      const tiles = [];
      for (let i = 0; i < word.length; i += 1) {
        const pair = word.slice(i, i + 2).toLowerCase();
        if (pair === "ij") {
          tiles.push("ij");
          i += 1;
        } else {
          tiles.push(word[i].toLowerCase());
        }
      }
      return tiles;
    }

    function normalizeInput(value) {
      return value.trim().toLowerCase().replace(/\s+/g, "");
    }

    function validWords() {
      return WORDS.filter((word) => wordToTiles(word).length === 12);
    }

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function shuffleTiles(answerTiles) {
      let shuffled = shuffle(answerTiles);
      let attempts = 0;
      while (shuffled.join("|") === answerTiles.join("|") && attempts < 20) {
        shuffled = shuffle(answerTiles);
        attempts += 1;
      }
      return shuffled;
    }

    function pickWord(previousAnswer = "") {
      const pool = validWords().filter((word) => word !== previousAnswer);
      if (!pool.length) throw new Error("Geen geldige 12-tegelwoorden gevonden.");
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60).toString().padStart(2, "0");
      const secs = (seconds % 60).toString().padStart(2, "0");
      return `${mins}:${secs}`;
    }

    function setMessage(text, type = "info") {
      elements.message.textContent = text;
      elements.message.className = `message show ${type}`;
    }

    function clearMessage() {
      elements.message.textContent = "";
      elements.message.className = "message";
    }

    function updateTimer() {
      if (!game) {
        elements.timer.textContent = formatTime(GAME_SECONDS);
        elements.timer.classList.remove("warning");
        return;
      }
      elements.timer.textContent = formatTime(game.remaining);
      elements.timer.classList.toggle("warning", game.remaining <= 20);
    }

    function stopTimer() {
      if (timerId) window.clearInterval(timerId);
      timerId = null;
    }

    function startTimer() {
      stopTimer();
      timerId = window.setInterval(() => {
        if (!game || game.paused || game.finished) return;
        game.remaining -= 1;
        updateTimer();
        if (game.remaining <= 0) {
          game.remaining = 0;
          endGame(false, `De tijd is op. Het antwoord was: ${game.answer.toUpperCase()}.`);
        }
      }, 1000);
    }

    function render() {
      updateTimer();

      const hasGame = Boolean(game);
      elements.emptyState.classList.toggle("hidden", hasGame);
      elements.gameArea.classList.toggle("hidden", !hasGame);
      elements.pauseBtn.disabled = !hasGame || game.finished;
      elements.pauseBtn.textContent = game?.paused ? "Verder" : "Pauze";
      elements.guessInput.disabled = !hasGame || game.finished || game.paused;
      elements.guessBtn.disabled = !hasGame || game.finished || game.paused;

      if (!hasGame) return;

      elements.scrambledLetters.innerHTML = "";
      game.scrambledTiles.forEach((tile, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `tile buyTile ${game.scrambledUsed[index] ? "used" : ""}`;
        button.textContent = tile;
        button.disabled = game.scrambledUsed[index] || game.finished || game.paused;
        button.setAttribute("aria-label", `Koop letter ${tile.toUpperCase()}`);
        button.addEventListener("click", () => buySpecificTile(index));
        elements.scrambledLetters.appendChild(button);
      });

      elements.answerSlots.innerHTML = "";
      game.answerTiles.forEach((tile, index) => {
        const slot = document.createElement("div");
        slot.className = `tile answerTile ${game.revealed[index] ? "revealed" : ""}`;
        slot.textContent = game.revealed[index] ? tile : "·";
        elements.answerSlots.appendChild(slot);
      });
    }

    function startNewGame() {
      const previous = game?.answer || "";
      const answer = pickWord(previous);
      const answerTiles = wordToTiles(answer);
      game = {
        answer,
        answerTiles,
        scrambledTiles: shuffleTiles(answerTiles),
        scrambledUsed: Array(answerTiles.length).fill(false),
        revealed: Array(answerTiles.length).fill(false),
        remaining: GAME_SECONDS,
        paused: false,
        finished: false,
      };
      elements.guessInput.value = "";
      clearMessage();
      render();
      startTimer();
      elements.guessInput.focus();
    }

    function buySpecificTile(scrambledIndex) {
      if (!game || game.finished || game.paused || game.scrambledUsed[scrambledIndex]) return;

      const tile = game.scrambledTiles[scrambledIndex];
      const possiblePositions = game.answerTiles
        .map((answerTile, index) => answerTile === tile && !game.revealed[index] ? index : null)
        .filter((index) => index !== null);

      if (!possiblePositions.length) return;

      const chosenPosition = possiblePositions[Math.floor(Math.random() * possiblePositions.length)];
      game.scrambledUsed[scrambledIndex] = true;
      game.revealed[chosenPosition] = true;

      setMessage(`Je kocht ${tile.toUpperCase()}. Die staat nu op positie ${chosenPosition + 1}.`, "info");
      render();
    }

    function endGame(won, text) {
      if (!game) return;
      game.finished = true;
      game.paused = false;
      game.remaining = Math.max(0, game.remaining);
      if (won) {
        game.revealed = Array(game.answerTiles.length).fill(true);
      }
      stopTimer();
      setMessage(text, won ? "good" : "danger");
      render();
    }

    function submitGuess(event) {
      event.preventDefault();
      if (!game || game.finished || game.paused) return;

      const guess = normalizeInput(elements.guessInput.value);
      const guessTiles = wordToTiles(guess);

      if (!guess) {
        setMessage("Vul eerst een antwoord in.", "info");
        return;
      }

      if (guessTiles.length !== game.answerTiles.length) {
        setMessage(`Je antwoord moet 12 tegels hebben. Let op: IJ telt als één tegel.`, "info");
        return;
      }

      if (guess === game.answer) {
        endGame(true, "Goed geraden!");
      } else {
        setMessage("Nog niet goed. Probeer opnieuw of koop een letter.", "info");
      }
    }

    function togglePause() {
      if (!game || game.finished) return;
      game.paused = !game.paused;
      setMessage(game.paused ? "Het spel staat op pauze." : "Je speelt verder.", "info");
      render();
      if (!game.paused) elements.guessInput.focus();
    }

    elements.newGameBtn.addEventListener("click", startNewGame);
    elements.pauseBtn.addEventListener("click", togglePause);
    elements.guessForm.addEventListener("submit", submitGuess);

    render();
  </script>
