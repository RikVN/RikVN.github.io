<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2 voor 12 oefenen</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #172033;
      --muted: #667085;
      --line: #d7dce7;
      --primary: #172033;
      --primary-hover: #2a3448;
      --good: #087443;
      --good-bg: #e9f8ef;
      --warn: #9a3412;
      --warn-bg: #fff3e8;
      --bad: #b42318;
      --bad-bg: #fff0f0;
      --tile: #172033;
      --tile-bought: #d0d5dd;
      --tile-bought-text: #667085;
      --shadow: 0 18px 50px rgba(17, 24, 39, 0.10);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(23, 32, 51, 0.10), transparent 34rem),
        var(--bg);
      color: var(--text);
    }

    main {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0;
    }

    header { text-align: center; margin-bottom: 28px; }

    h1 {
      margin: 0;
      font-size: clamp(34px, 6vw, 58px);
      letter-spacing: -0.055em;
      line-height: 0.98;
    }

    .subtitle {
      max-width: 720px;
      margin: 16px auto 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.6;
    }

    .card {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.75);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(18px, 4vw, 34px);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .timer-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .timer {
      min-width: 108px;
      padding: 10px 14px;
      border-radius: 16px;
      background: #f2f4f7;
      font-variant-numeric: tabular-nums;
      font-size: 28px;
      font-weight: 900;
      text-align: center;
    }

    .timer.low { color: var(--bad); background: var(--bad-bg); }

    button {
      appearance: none;
      border: 0;
      border-radius: 15px;
      padding: 12px 16px;
      background: var(--primary);
      color: white;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease, opacity 120ms ease;
    }

    button:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-1px); }
    button:disabled { opacity: 0.48; cursor: not-allowed; }

    .secondary {
      background: #eef1f7;
      color: #172033;
    }
    .secondary:hover:not(:disabled) { background: #e1e6f0; }

    .settings {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 14px;
      padding: 16px;
      margin-bottom: 24px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: #f8fafc;
    }

    .setting label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 900;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .setting select {
      width: 100%;
      min-height: 48px;
      border: 2px solid var(--line);
      border-radius: 16px;
      padding: 0 14px;
      background: white;
      color: var(--text);
      font: inherit;
      font-weight: 750;
      outline: none;
    }

    .setting select:focus { border-color: #98a2b3; }


    .section-title {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .letters-row {
      display: grid;
      grid-template-columns: repeat(12, minmax(42px, 1fr));
      gap: 8px;
      margin-bottom: 26px;
    }

    .letter-tile {
      width: 100%;
      min-height: 56px;
      border-radius: 16px;
      background: var(--tile);
      color: white;
      display: grid;
      place-items: center;
      font-size: clamp(18px, 3vw, 28px);
      font-weight: 950;
      text-transform: uppercase;
      box-shadow: 0 8px 18px rgba(23, 32, 51, 0.16);
      user-select: none;
    }

    .letter-tile.bought {
      background: var(--tile-bought);
      color: var(--tile-bought-text);
      box-shadow: none;
      text-decoration: line-through;
    }

    .answer-row {
      display: grid;
      grid-template-columns: repeat(12, minmax(42px, 1fr));
      gap: 8px;
      margin-bottom: 24px;
    }

    .answer-cell {
      width: 100%;
      min-height: 56px;
      border: 2px solid var(--line);
      border-radius: 16px;
      background: white;
      display: grid;
      place-items: center;
      font-size: clamp(18px, 3vw, 28px);
      font-weight: 950;
      text-transform: uppercase;
      color: #c2c8d2;
    }

    .answer-cell.revealed {
      border-color: #b8e6ca;
      background: var(--good-bg);
      color: var(--good);
    }

    .answer-cell.wrong {
      border-color: #fecaca;
      background: var(--bad-bg);
      color: var(--bad);
    }

    .guess-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-top: 8px;
    }

    input {
      width: 100%;
      height: 52px;
      border: 2px solid var(--line);
      border-radius: 16px;
      padding: 0 16px;
      color: var(--text);
      background: white;
      font: inherit;
      font-size: 18px;
      outline: none;
    }

    input:focus { border-color: #98a2b3; }
    input:disabled { background: #f2f4f7; color: #98a2b3; }

    .message {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 18px;
      font-weight: 750;
      line-height: 1.45;
      background: #eef1f7;
      color: #344054;
    }

    .message.good { background: var(--good-bg); color: var(--good); }
    .message.warn { background: var(--warn-bg); color: var(--warn); }
    .message.bad { background: var(--bad-bg); color: var(--bad); }

    .empty-state {
      border: 2px dashed var(--line);
      border-radius: 22px;
      padding: 36px 20px;
      text-align: center;
      color: var(--muted);
      background: rgba(255,255,255,0.55);
    }

    .empty-state strong { display: block; color: var(--text); font-size: 22px; margin-bottom: 8px; }

    .hidden { display: none !important; }

    @media (max-width: 760px) {
      main { width: min(100% - 20px, 1040px); padding: 22px 0; }
      .settings { grid-template-columns: 1fr; padding: 12px; }
      .letters-row, .answer-row { gap: 5px; grid-template-columns: repeat(12, minmax(24px, 1fr)); }
      .letter-tile, .answer-cell { min-height: 42px; border-radius: 11px; font-size: 15px; }
      .guess-form { grid-template-columns: 1fr; }
      .timer { font-size: 23px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>2 voor 12 oefenen</h1>
      <p class="subtitle">Klik op <strong>Nieuw spel</strong>, koop eventueel specifieke letters door erop te klikken, en raad het woord binnen twee minuten.</p>
    </header>

    <section class="card">
      <div class="topbar">
        <div class="timer-wrap">
          <div id="timer" class="timer">2:00</div>
          <button id="pauseBtn" class="secondary" type="button" disabled>Pauze</button>
          <button id="giveUpBtn" class="secondary" type="button" disabled>Geef op</button>
        </div>
        <button id="newGameBtn" type="button">Nieuw spel</button>
      </div>

      <div class="settings" aria-label="Spelopties">
        <div class="setting">
          <label for="wrongCountSelect">Gegarandeerd foute letters</label>
          <select id="wrongCountSelect">
            <option value="0" selected>0 foute letters</option>
            <option value="1">1 foute letter</option>
            <option value="2">2 foute letters</option>
            <option value="3">3 foute letters</option>
            <option value="4">4 foute letters</option>
          </select>
        </div>

        <div class="setting">
          <label for="correctChanceSelect">Kans dat een letter klopt</label>
          <select id="correctChanceSelect">
            <option value="100" selected>100% correct</option>
            <option value="99">99% correct</option>
            <option value="98">98% correct</option>
            <option value="95">95% correct</option>
            <option value="90">90% correct</option>
            <option value="80">80% correct</option>
          </select>
        </div>
      </div>

      <div id="emptyState" class="empty-state">
        <strong>Nog geen spel gestart</strong>
        Klik op <em>Nieuw spel</em> om de letters en de timer te starten.
      </div>

      <div id="gameArea" class="hidden">
        <p class="section-title">Klik op een letter om die te kopen</p>
        <div id="lettersRow" class="letters-row" aria-label="Geschudde letters"></div>

        <p class="section-title">Gekochte letters op de juiste plek</p>
        <div id="answerRow" class="answer-row" aria-label="Antwoordposities"></div>

        <form id="guessForm" class="guess-form">
          <input id="guessInput" type="text" autocomplete="off" spellcheck="false" placeholder="Typ je antwoord..." />
          <button id="guessBtn" type="submit">Gok</button>
        </form>
      </div>

      <div id="message" class="message hidden"></div>
    </section>
  </main>

    const GAME_SECONDS = 120;

    const state = {
      answer: "",
      answerTiles: [],
      shuffledTiles: [],
      boughtTileIds: new Set(),
      revealed: [],
      remainingSeconds: GAME_SECONDS,
      timerId: null,
      paused: false,
      started: false,
      ended: false,
      previousAnswer: "",
      wrongCount: 0,
      correctChance: 100
    };

    const timerEl = document.getElementById("timer");
    const pauseBtn = document.getElementById("pauseBtn");
    const giveUpBtn = document.getElementById("giveUpBtn");
    const newGameBtn = document.getElementById("newGameBtn");
    const wrongCountSelect = document.getElementById("wrongCountSelect");
    const correctChanceSelect = document.getElementById("correctChanceSelect");
    const emptyState = document.getElementById("emptyState");
    const gameArea = document.getElementById("gameArea");
    const lettersRow = document.getElementById("lettersRow");
    const answerRow = document.getElementById("answerRow");
    const guessForm = document.getElementById("guessForm");
    const guessInput = document.getElementById("guessInput");
    const guessBtn = document.getElementById("guessBtn");
    const messageEl = document.getElementById("message");

    function normalizeWord(value) {
      return value.trim().toLowerCase();
    }

    function splitTiles(word) {
      const tiles = [];
      const lower = normalizeWord(word);
      for (let i = 0; i < lower.length; i += 1) {
        if (lower.slice(i, i + 2) === "ij") {
          tiles.push("ij");
          i += 1;
        } else {
          tiles.push(lower[i]);
        }
      }
      return tiles;
    }

    function tileLength(word) {
      return splitTiles(word).length;
    }

    function formatTile(tile) {
      return tile === "ij" ? "IJ" : tile.toUpperCase();
    }

    function makeId(value, index) {
      return `${value}-${index}-${Math.random().toString(36).slice(2)}`;
    }

    function shuffle(array) {
      const copy = array.map((value) => ({ ...value }));
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function sample(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function getValidWords() {
      return WORDS
        .map(normalizeWord)
        .filter(Boolean)
        .filter((word, index, arr) => arr.indexOf(word) === index)
        .filter((word) => tileLength(word) === 12);
    }

    function getLetterPool() {
      const pool = new Set();
      getValidWords().forEach((word) => splitTiles(word).forEach((tile) => pool.add(tile)));
      return Array.from(pool);
    }

    function pickWrongTile(correctTile) {
      const choices = getLetterPool().filter((tile) => tile !== correctTile);
      return sample(choices.length ? choices : ["a", "e", "n", "r", "t"]);
    }

    function pickWord() {
      const validWords = getValidWords();
      if (!validWords.length) {
        throw new Error("Geen geldige woorden gevonden. Voeg woorden met precies 12 tegels toe.");
      }
      const candidates = validWords.length > 1
        ? validWords.filter((word) => word !== state.previousAnswer)
        : validWords;
      return candidates[Math.floor(Math.random() * candidates.length)];
    }

    function getRandomPositions(count, max) {
      const positions = Array.from({ length: max }, (_, index) => index);
      for (let i = positions.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [positions[i], positions[j]] = [positions[j], positions[i]];
      }
      return positions.slice(0, Math.max(0, Math.min(count, max)));
    }

    function buildPuzzleTiles(answerTiles, guaranteedWrongCount, correctChance) {
      const tiles = answerTiles.map((tile, index) => ({
        id: makeId(tile, index),
        value: tile,
        correctValue: tile,
        answerIndex: index,
        isWrong: false
      }));

      const guaranteedWrongPositions = new Set(getRandomPositions(guaranteedWrongCount, answerTiles.length));

      guaranteedWrongPositions.forEach((index) => {
        tiles[index].value = pickWrongTile(answerTiles[index]);
        tiles[index].isWrong = true;
      });

      tiles.forEach((tile, index) => {
        if (tile.isWrong) return;
        const becomesWrong = Math.random() > (correctChance / 100);
        if (becomesWrong) {
          tile.value = pickWrongTile(answerTiles[index]);
          tile.isWrong = true;
        }
      });

      return shuffle(tiles);
    }

    function setMessage(text, type = "") {
      messageEl.textContent = text;
      messageEl.className = `message ${type}`;
      messageEl.classList.toggle("hidden", !text);
    }

    function updateTimerDisplay() {
      const minutes = Math.floor(state.remainingSeconds / 60);
      const seconds = String(state.remainingSeconds % 60).padStart(2, "0");
      timerEl.textContent = `${minutes}:${seconds}`;
      timerEl.classList.toggle("low", state.remainingSeconds <= 20 && state.started && !state.ended);
    }

    function stopTimer() {
      if (state.timerId) {
        clearInterval(state.timerId);
        state.timerId = null;
      }
    }

    function startTimer() {
      stopTimer();
      state.timerId = setInterval(() => {
        if (state.paused || state.ended) return;
        state.remainingSeconds -= 1;
        updateTimerDisplay();
        if (state.remainingSeconds <= 0) {
          finishGame(false, "De tijd is op.");
        }
      }, 1000);
    }

    function render() {
      updateTimerDisplay();

      emptyState.classList.toggle("hidden", state.started);
      gameArea.classList.toggle("hidden", !state.started);

      pauseBtn.disabled = !state.started || state.ended;
      giveUpBtn.disabled = !state.started || state.ended;
      pauseBtn.textContent = state.paused ? "Verder" : "Pauze";
      guessInput.disabled = !state.started || state.ended || state.paused;
      guessBtn.disabled = !state.started || state.ended || state.paused;

      lettersRow.innerHTML = "";
      state.shuffledTiles.forEach((tile) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "letter-tile";
        button.textContent = formatTile(tile.value);
        button.disabled = state.ended || state.paused || state.boughtTileIds.has(tile.id);
        if (state.boughtTileIds.has(tile.id)) button.classList.add("bought");
        button.addEventListener("click", () => buySpecificTile(tile));
        lettersRow.appendChild(button);
      });

      answerRow.innerHTML = "";
      state.answerTiles.forEach((tile, index) => {
        const cell = document.createElement("div");
        const revealedValue = state.revealed[index];
        cell.className = "answer-cell";

        if (revealedValue === "letter") {
          cell.classList.add("revealed");
          cell.textContent = formatTile(tile);
        } else if (revealedValue === "dash") {
          cell.classList.add("wrong");
          cell.textContent = "—";
          cell.title = "Hier is een verkeerde letter gekocht.";
        } else {
          cell.textContent = "·";
        }
        answerRow.appendChild(cell);
      });
    }

    function newGame() {
      stopTimer();
      try {
        const answer = pickWord();
        const wrongCount = Number(wrongCountSelect.value);
        const correctChance = Number(correctChanceSelect.value);

        state.previousAnswer = answer;
        state.answer = answer;
        state.answerTiles = splitTiles(answer);
        state.wrongCount = wrongCount;
        state.correctChance = correctChance;
        state.shuffledTiles = buildPuzzleTiles(state.answerTiles, wrongCount, correctChance);
        state.boughtTileIds = new Set();
        state.revealed = Array(state.answerTiles.length).fill(null);
        state.remainingSeconds = GAME_SECONDS;
        state.paused = false;
        state.started = true;
        state.ended = false;
        guessInput.value = "";

        setMessage(`Nieuw spel gestart. De letters zijn vooraf gemaakt met ${wrongCount} gegarandeerde foute letter(s) en ${correctChance}% correct-kans. Welke letters fout zijn, blijft verborgen.`, "");
        render();
        startTimer();
        guessInput.focus();
      } catch (error) {
        setMessage(error.message, "bad");
      }
    }

    function buySpecificTile(tile) {
      if (!state.started || state.ended || state.paused || state.boughtTileIds.has(tile.id)) return;

      state.boughtTileIds.add(tile.id);

      if (tile.isWrong) {
        state.revealed[tile.answerIndex] = "dash";
        setMessage(`${formatTile(tile.value)} gekocht. Die letter is fout; op positie ${tile.answerIndex + 1} verschijnt een streepje.`, "bad");
      } else {
        state.revealed[tile.answerIndex] = "letter";
        setMessage(`${formatTile(tile.value)} gekocht en op positie ${tile.answerIndex + 1} gezet.`, "good");
      }

      render();
    }

    function revealRemainingCorrectLetters() {
      state.revealed = state.revealed.map((value) => value || "letter");
    }

    function finishGame(won, reason) {
      state.ended = true;
      state.paused = false;
      stopTimer();
      if (won) {
        state.revealed = Array(state.answerTiles.length).fill("letter");
      } else {
        revealRemainingCorrectLetters();
      }
      render();
      setMessage(`${reason} Het antwoord was: ${state.answer.toUpperCase()}`, won ? "good" : "bad");
    }

    function submitGuess(event) {
      event.preventDefault();
      if (!state.started || state.ended || state.paused) return;

      const guess = normalizeWord(guessInput.value);
      if (!guess) {
        setMessage("Vul eerst een antwoord in.", "warn");
        return;
      }

      if (tileLength(guess) !== 12) {
        setMessage("Je antwoord moet uit precies 12 tegels bestaan. IJ telt als één tegel.", "warn");
        return;
      }

      if (guess === state.answer) {
        finishGame(true, "Goed geraden!");
      } else {
        setMessage("Nog niet goed. Probeer opnieuw of koop een letter.", "warn");
        guessInput.select();
      }
    }

    function togglePause() {
      if (!state.started || state.ended) return;
      state.paused = !state.paused;
      setMessage(state.paused ? "Gepauzeerd. Klik op Verder om door te spelen." : "Verder spelen.");
      render();
      if (!state.paused) guessInput.focus();
    }

    function giveUp() {
      if (!state.started || state.ended) return;
      state.ended = true;
      state.paused = false;
      stopTimer();
      state.revealed = Array(state.answerTiles.length).fill("letter");
      render();
      setMessage(`Opgegeven. Het antwoord was: ${state.answer.toUpperCase()}`, "bad");
    }

    newGameBtn.addEventListener("click", newGame);
    pauseBtn.addEventListener("click", togglePause);
    giveUpBtn.addEventListener("click", giveUp);
    guessForm.addEventListener("submit", submitGuess);

    render();
  </script>
</body>
</html>
