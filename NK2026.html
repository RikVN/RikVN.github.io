  <script>
const data = JSON.parse(document.getElementById('wqc-data').textContent);
let currentView = 'overview';
let overviewSort = { key: 'total', direction: 'desc' };
let metricSort = { key: 'inverse', direction: 'desc' };
let averageMetricSort = { key: 'averageKnown', direction: 'asc' };
const storageKey = `quiz-dashboard-compare-${data.meta.quiz}-v1`;
let compareState = loadCompareState();

const titles = {
  overview: 'Overview',
  categories: 'Category tables',
  compareQuizzers: 'Compare quizzers',
  rareCorrect: 'Solos, duos & trios',
  negativeRare: 'Negative solos, duos & trios',
  xFullHouses: "X's and Full Houses",
  quizzer: 'Quizzer report',
  nkBestTeams: 'Best Teams',
  teams: 'Best teams',
  metrics: 'Metrics',
  indicative: 'Indicative questions',
};

const view = document.getElementById('view');
const controls = document.getElementById('controls');
const titleEl = document.getElementById('viewTitle');
document.getElementById('metaLine').textContent = `${data.meta.playerCount} ${data.meta.playerLabel} · ${data.meta.questionCount} questions`;

for (const button of document.querySelectorAll('.nav-button')) {
  button.addEventListener('click', () => {
    currentView = button.dataset.view;
    document.querySelectorAll('.nav-button').forEach(b => b.classList.toggle('active', b === button));
    render();
  });
}

function escapeHtml(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function categoryLabel(category) { return data.meta.categoryLabels[category] || category; }
function setControls(html) { controls.innerHTML = html || ''; }
function heading(title, subtitle='') { return `<div class="section-heading"><div><h3>${escapeHtml(title)}</h3>${subtitle ? `<p>${escapeHtml(subtitle)}</p>` : ''}</div></div>`; }
function table(headers, rows, rowRenderer) {
  if (!rows.length) return '<div class="empty">No rows to show.</div>';
  return `<div class="table-wrap"><table><thead><tr>${headers.map(h => `<th>${escapeHtml(h)}</th>`).join('')}</tr></thead><tbody>${rows.map(rowRenderer).join('')}</tbody></table></div>`;
}
function categoryTable(headers, rows, rowRenderer) {
  if (!rows.length) return '<div class="empty">No rows to show.</div>';
  return `<div class="table-wrap sticky-first-two"><table><thead><tr>${headers.map(h => `<th>${escapeHtml(h)}</th>`).join('')}</tr></thead><tbody>${rows.map(rowRenderer).join('')}</tbody></table></div>`;
}
function answerWithCategory(row) { return `<span class="answer">${escapeHtml(row.answer)}</span> <span class="category">(${escapeHtml(categoryLabel(row.category))})</span>`; }

function render() { titleEl.textContent = titles[currentView] || currentView; renderControls(); renderMainOnly(); }

function renderControls() {
  if (currentView === 'categories') {
    setControls(`<label class="control-group control-group-large">Category <select id="categorySelect" class="big-select">${data.meta.categories.map(c => `<option value="${escapeHtml(c)}"${c === compareState.category ? ' selected' : ''}>${escapeHtml(categoryLabel(c))}</option>`).join('')}</select></label>`);
    document.getElementById('categorySelect').addEventListener('change', event => { compareState.category = event.target.value; saveCompareState(); renderMainOnly(); });
  } else if (currentView === 'compareQuizzers') {
    setControls(renderCompareControls());
    document.getElementById('compareCategorySelect').addEventListener('change', event => { compareState.category = event.target.value; saveCompareState(); renderMainOnly(); });
    for (const select of document.querySelectorAll('.compare-quizzer-select')) {
      select.addEventListener('change', event => { compareState.quizzers[Number(event.target.dataset.index)] = event.target.value; saveCompareState(); renderMainOnly(); });
    }
  } else if (currentView === 'nkBestTeams') {
    const options = ['All', ...data.players];
    setControls(`<label class="control-group control-group-large">Duo <select id="nkBestTeamDuoSelect" class="big-select">${options.map(name => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`).join('')}</select></label>`);
    document.getElementById('nkBestTeamDuoSelect').addEventListener('change', renderMainOnly);
  } else if (currentView === 'teams') {
    setControls(`<label class="control-group">Team size <select id="teamSizeSelect">${data.meta.teamSizes.map(s => `<option value="${s}"${String(s) === '4' ? ' selected' : ''}>${s}</option>`).join('')}</select></label><label class="control-group">Ranking <select id="teamRankingSelect"><option value="raw">Raw score</option><option value="relative">Relative score</option></select></label>`);
    document.getElementById('teamSizeSelect').addEventListener('change', renderMainOnly);
    document.getElementById('teamRankingSelect').addEventListener('change', renderMainOnly);
  } else if (currentView === 'quizzer') {
    setControls(`<label class="control-group">Quizzer <select id="quizzerSelect">${data.players.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('')}</select></label>`);
    document.getElementById('quizzerSelect').addEventListener('change', renderMainOnly);
  } else if (currentView === 'indicative') {
    const options = Object.keys(data.indicativeQuestions || {}).sort((a, b) => Number(a) - Number(b));
    if (!options.length) { setControls(''); return; }
    setControls(`<label class="control-group">Compare <select id="indicativeTopSelect">${options.map(n => `<option value="${n}">Top ${n} vs rest</option>`).join('')}</select></label>`);
    document.getElementById('indicativeTopSelect').addEventListener('change', renderMainOnly);
  } else {
    setControls('');
  }
}

function renderMainOnly() {
  const renderers = { overview: renderOverview, categories: renderCategories, compareQuizzers: renderCompareQuizzers, rareCorrect: renderRareCorrect, negativeRare: renderNegativeRare, xFullHouses: renderXFullHouses, quizzer: renderQuizzer, nkBestTeams: renderNkBestTeams, teams: renderTeams, metrics: renderMetrics, indicative: renderIndicative };
  view.innerHTML = (renderers[currentView] || renderOverview)();
  if (currentView === 'overview') attachOverviewSortHandlers();
  if (currentView === 'metrics') attachMetricSortHandlers();
  updateFloatingScrollbarTarget();
}

let floatingScrollbar = null;
let floatingInner = null;
let activeScrollWrap = null;
let floatingSyncing = false;

function ensureFloatingScrollbar() {
  if (floatingScrollbar) return;
  floatingScrollbar = document.createElement('div');
  floatingScrollbar.className = 'page-scrollbar';
  floatingScrollbar.setAttribute('aria-label', 'Horizontal table scrollbar');
  floatingInner = document.createElement('div');
  floatingInner.className = 'page-scrollbar-inner';
  floatingScrollbar.appendChild(floatingInner);
  document.body.appendChild(floatingScrollbar);

  floatingScrollbar.addEventListener('scroll', () => {
    if (!activeScrollWrap || floatingSyncing) return;
    floatingSyncing = true;
    activeScrollWrap.scrollLeft = floatingScrollbar.scrollLeft;
    floatingSyncing = false;
  });

  window.addEventListener('scroll', () => requestAnimationFrame(updateFloatingScrollbarTarget), { passive: true });
  window.addEventListener('resize', () => requestAnimationFrame(updateFloatingScrollbarTarget));
}

function attachTableScrollSync(wrap) {
  if (wrap.dataset.floatScrollbarReady === '1') return;
  wrap.dataset.floatScrollbarReady = '1';
  wrap.addEventListener('scroll', () => {
    if (wrap !== activeScrollWrap || floatingSyncing || !floatingScrollbar) return;
    floatingSyncing = true;
    floatingScrollbar.scrollLeft = wrap.scrollLeft;
    floatingSyncing = false;
  });
}

function visibleScore(element) {
  const rect = element.getBoundingClientRect();
  const top = Math.max(rect.top, 0);
  const bottom = Math.min(rect.bottom, window.innerHeight - 42);
  return Math.max(0, bottom - top);
}

function updateFloatingScrollbarTarget() {
  ensureFloatingScrollbar();
  const candidates = [...document.querySelectorAll('#view .table-wrap')]
    .filter(wrap => wrap.scrollWidth > wrap.clientWidth + 2 && visibleScore(wrap) > 0);

  if (!candidates.length) {
    activeScrollWrap = null;
    floatingScrollbar.style.display = 'none';
    return;
  }

  activeScrollWrap = candidates.sort((a, b) => visibleScore(b) - visibleScore(a))[0];
  attachTableScrollSync(activeScrollWrap);
  const rect = activeScrollWrap.getBoundingClientRect();
  const left = Math.max(16, rect.left);
  const right = Math.min(window.innerWidth - 16, rect.right);
  const width = Math.max(160, right - left);

  floatingInner.style.width = `${activeScrollWrap.scrollWidth}px`;
  floatingScrollbar.style.left = `${left}px`;
  floatingScrollbar.style.width = `${width}px`;
  floatingScrollbar.style.display = 'block';

  if (!floatingSyncing) {
    floatingSyncing = true;
    floatingScrollbar.scrollLeft = activeScrollWrap.scrollLeft;
    floatingSyncing = false;
  }
}

function sortIndicator(key) { if (overviewSort.key !== key) return ''; return overviewSort.direction === 'asc' ? ' ▲' : ' ▼'; }
function overviewValue(row, key) { if (key === 'player') return row.player.toLowerCase(); if (key === 'total') return row.total; return row.categories[key] ?? 0; }
function renderOverview() {
  const categories = data.meta.categories;
  const rows = [...data.overview].sort((a, b) => {
    const av = overviewValue(a, overviewSort.key); const bv = overviewValue(b, overviewSort.key);
    let cmp = typeof av === 'string' ? av.localeCompare(bv) : av - bv;
    if (cmp === 0 && overviewSort.key !== 'total') cmp = b.total - a.total;
    return overviewSort.direction === 'asc' ? cmp : -cmp;
  });
  const headers = [{ label: 'Player', key: 'player' }, { label: 'Total', key: 'total' }, ...categories.map(category => ({ label: categoryLabel(category), key: category }))];
  const thead = headers.map(h => `<th><button class="sort-button" data-sort-key="${escapeHtml(h.key)}">${escapeHtml(h.label)}${sortIndicator(h.key)}</button></th>`).join('');
  const body = rows.map(row => `<tr><td class="answer">${escapeHtml(row.player)}</td><td class="num"><strong>${row.total}</strong></td>${categories.map(c => `<td class="num">${row.categories[c]}</td>`).join('')}</tr>`).join('');
  return heading('Overall results', 'Click any column header to sort by that column.') + `<div class="table-wrap"><table><thead><tr>${thead}</tr></thead><tbody>${body}</tbody></table></div>`;
}
function attachOverviewSortHandlers() {
  for (const button of view.querySelectorAll('[data-sort-key]')) {
    button.addEventListener('click', () => {
      const key = button.dataset.sortKey;
      if (overviewSort.key === key) overviewSort.direction = overviewSort.direction === 'asc' ? 'desc' : 'asc';
      else { overviewSort.key = key; overviewSort.direction = key === 'player' ? 'asc' : 'desc'; }
      renderMainOnly();
    });
  }
}

function loadCompareState() {
  const fallback = { category: data.meta.categories[0], quizzers: ['', '', '', '', ''] };
  try {
    const saved = JSON.parse(localStorage.getItem(storageKey) || '{}');
    const category = data.meta.categories.includes(saved.category) ? saved.category : fallback.category;
    const quizzers = Array.isArray(saved.quizzers) ? saved.quizzers.slice(0, 5) : fallback.quizzers;
    while (quizzers.length < 5) quizzers.push('');
    return { category, quizzers: quizzers.map(name => name === '' || data.players.includes(name) ? name : '') };
  } catch { return fallback; }
}
function saveCompareState() { localStorage.setItem(storageKey, JSON.stringify(compareState)); }
function playerOptions(selectedName) { return `<option value="">—</option>` + data.players.map(player => `<option value="${escapeHtml(player)}"${player === selectedName ? ' selected' : ''}>${escapeHtml(player)}</option>`).join(''); }
function renderCompareControls() {
  const categoryControl = `<label class="control-group control-group-large">Category <select id="compareCategorySelect" class="big-select">${data.meta.categories.map(c => `<option value="${escapeHtml(c)}"${c === compareState.category ? ' selected' : ''}>${escapeHtml(categoryLabel(c))}</option>`).join('')}</select></label>`;
  const quizzerControls = compareState.quizzers.map((name, idx) => `<label class="control-group">${idx + 1}<select class="compare-quizzer-select" data-index="${idx}">${playerOptions(name)}</select></label>`).join('');
  return `<div class="compare-controls">${categoryControl}${quizzerControls}</div>`;
}
function selectedCompareQuizzers() {
  const seen = new Set(); const selected = [];
  for (const name of compareState.quizzers) { if (name && !seen.has(name)) { seen.add(name); selected.push(name); } }
  return selected;
}
function renderCompareQuizzers() {
  const category = compareState.category;
  const selected = selectedCompareQuizzers();
  if (!selected.length) return heading('Compare quizzers', 'Select up to five quizzers above. Your selection is remembered in this browser.') + '<div class="empty">No quizzers selected yet.</div>';
  const rows = data.categoryTables[category] || [];
  return heading(`Compare quizzers: ${categoryLabel(category)}`, 'The 1/0 values match the original Excel-style correctness values.') + table(
    ['Answer', 'Total', ...selected],
    rows,
    row => `<tr><td class="answer">${escapeHtml(row.answer)}</td><td class="num">${row.total}</td>${selected.map(player => `<td class="num"><strong>${row.correct.includes(player) ? 1 : 0}</strong></td>`).join('')}</tr>`
  );
}

function renderCategories() {
  const category = document.getElementById('categorySelect')?.value || compareState.category;
  const rows = data.categoryTables[category] || [];
  return heading(`Category: ${categoryLabel(category)}`, `${rows.length} questions`) + categoryTable(
    ['Q#', 'Answer', 'Total', ...data.players],
    rows,
    row => `<tr><td class="num">${row.q}</td><td class="answer">${escapeHtml(row.answer)}</td><td class="num"><strong>${row.total}</strong></td>${data.players.map(player => `<td class="num">${row.correct.includes(player) ? 1 : 0}</td>`).join('')}</tr>`
  );
}

function renderRareCorrect() {
  return heading('Solos, duos & trios', 'Rare correct answers: known by exactly one, two, or three quizzers/duos.') + `<div class="stacked-sections"><section><h3>Solos</h3>${renderSpecialTable(data.specialLists.solos, 'Correct')}</section><section><h3>Duos</h3>${renderSpecialTable(data.specialLists.duos, 'Correct')}</section><section><h3>Trios</h3>${renderSpecialTable(data.specialLists.trios, 'Correct')}</section></div>`;
}
function renderNegativeRare() {
  return heading('Negative solos, duos & trios', 'Rare misses: answers missed by exactly one, two, or three quizzers/duos.') + `<div class="stacked-sections"><section><h3>Negative solos</h3>${renderSpecialTable(data.specialLists.negativeSolos, 'Missed by')}</section><section><h3>Negative duos</h3>${renderSpecialTable(data.specialLists.negativeDuos, 'Missed by')}</section><section><h3>Negative trios</h3>${renderSpecialTable(data.specialLists.negativeTrios, 'Missed by')}</section></div>`;
}
function renderSpecialTable(rows, peopleHeader) { return table(['Answer', peopleHeader], rows || [], row => `<tr><td>${answerWithCategory(row)}</td><td>${escapeHtml((row.people || []).join(', '))}</td></tr>`); }
function renderXFullHouses() {
  return heading("X's and Full Houses", "Questions nobody knew, and questions everybody knew.") + `<div class="stacked-sections"><section><h3>X's: nobody knew</h3>${renderPlainSpecialTable(data.specialLists.nobodyKnew || [])}</section><section><h3>Full Houses: everybody knew</h3>${renderPlainSpecialTable(data.specialLists.fullHouse || [])}</section></div>`;
}
function renderPlainSpecialTable(rows) { return table(['Answer'], rows || [], row => `<tr><td>${answerWithCategory(row)}</td></tr>`); }

function renderQuizzer() {
  const quizzer = document.getElementById('quizzerSelect')?.value || data.players[0];
  const report = data.quizzerReports[quizzer];
  const correctTable = table(['Answer', 'Others knew'], report.bestCorrect, row => `<tr><td>${answerWithCategory(row)}</td><td class="num"><span class="badge ${row.othersKnew === 0 ? 'good' : ''}">${row.ratio}</span></td></tr>`);
  const wrongTable = table(['Answer', 'Others knew'], report.worstMisses, row => `<tr><td>${answerWithCategory(row)}</td><td class="num"><span class="badge ${row.othersKnew === row.otherCount ? 'bad' : row.othersKnew > row.otherCount / 2 ? 'warn' : ''}">${row.ratio}</span></td></tr>`);
  return heading(`Quizzer report: ${quizzer}`, 'Best correct answers are rare points; worst misses are answers that many others knew.') + `<div class="two-col"><section><h3>Best correct answers</h3>${correctTable}</section><section><h3>Worst missed answers</h3>${wrongTable}</section></div>`;
}


function renderNkBestTeams() {
  const selectedDuo = document.getElementById('nkBestTeamDuoSelect')?.value || 'All';
  const allRows = data.nkBestTeams || [];
  const rows = selectedDuo === 'All' ? allRows : allRows.filter(row => row.team.includes(selectedDuo));
  const subtitle = selectedDuo === 'All'
    ? 'All combinations of two duos, ranked by raw coverage score.'
    : `Only combinations that include ${selectedDuo}, ranked by raw coverage score.`;
  return heading('Best Teams', subtitle) + table(
    ['Team of 2 duos', 'Score'],
    rows,
    row => `<tr><td class="answer">${escapeHtml(row.team.join(' + '))}</td><td class="num"><strong>${row.score}</strong></td></tr>`
  );
}

function renderTeams() {
  const size = document.getElementById('teamSizeSelect')?.value || (data.meta.teamSizes.includes(4) ? '4' : String(data.meta.teamSizes[0]));
  const ranking = document.getElementById('teamRankingSelect')?.value || 'raw';
  const rows = (data.teams[size] && data.teams[size][ranking]) || [];
  return heading(`Best teams of ${size}`, `Ranking: ${ranking === 'raw' ? 'raw coverage score' : 'relative score'} · max individual difference ${data.meta.maxScoreDiff}`) + table(['Team', 'Score', 'Relative', 'Individual scores'], rows, row => `<tr><td class="answer">${escapeHtml(row.team.join(', '))}</td><td class="num"><strong>${row.score}</strong></td><td class="num">${row.relative}</td><td>${escapeHtml(row.individualScores.join(', '))}</td></tr>`);
}

function metricSortIndicator(sortState, key) { if (sortState.key !== key) return ''; return sortState.direction === 'asc' ? ' ▲' : ' ▼'; }
function metricValue(row, key) { if (key === 'player') return row.player.toLowerCase(); return row[key] ?? 0; }
function sortMetricRows(rows, sortState) { return [...rows].sort((a, b) => { const av = metricValue(a, sortState.key); const bv = metricValue(b, sortState.key); let cmp = typeof av === 'string' ? av.localeCompare(bv) : av - bv; return sortState.direction === 'asc' ? cmp : -cmp; }); }
function sortableMetricTable(headers, rows, rowRenderer, sortState, dataPrefix) {
  if (!rows.length) return '<div class="empty">No rows to show.</div>';
  const thead = headers.map(h => `<th><button class="sort-button" data-${dataPrefix}-sort-key="${escapeHtml(h.key)}">${escapeHtml(h.label)}${metricSortIndicator(sortState, h.key)}</button></th>`).join('');
  return `<div class="table-wrap"><table><thead><tr>${thead}</tr></thead><tbody>${rows.map(rowRenderer).join('')}</tbody></table></div>`;
}
function renderMetrics() {
  const metricRows = sortMetricRows(data.metrics.combined, metricSort);
  const averageRows = sortMetricRows(data.metrics.combined, averageMetricSort);
  const metricHeaders = [{ label: 'Player', key: 'player' }, { label: 'Inverse score', key: 'inverse' }, { label: 'KFL score', key: 'kfl' }, { label: 'Total', key: 'total' }];
  const averageHeaders = [{ label: 'Player', key: 'player' }, { label: 'Average known count', key: 'averageKnown' }];
  const metricTable = sortableMetricTable(metricHeaders, metricRows, row => `<tr><td class="answer">${escapeHtml(row.player)}</td><td class="num">${row.inverse}</td><td class="num">${row.kfl}</td><td class="num">${row.total}</td></tr>`, metricSort, 'metric');
  const avgTable = sortableMetricTable(averageHeaders, averageRows, row => `<tr><td class="answer">${escapeHtml(row.player)}</td><td class="num">${row.averageKnown}</td></tr>`, averageMetricSort, 'avg');
  return heading('Player metrics', 'Click any column header to sort.') + `<div class="explanation"><p><strong>Inverse score</strong> gives extra credit for rare correct answers. A solo is worth a lot, while a very common answer adds much less.</p><p><strong>KFL score</strong> also rewards rarity: every correct answer counts, with a bonus when fewer quizzers knew it.</p><p><strong>Average known count</strong> shows how common a quizzer’s correct answers usually were. Lower means their correct answers tended to be more unusual.</p></div><section><h3>Rarity scores</h3>${metricTable}</section><br><section><h3>Average known count</h3>${avgTable}</section>`;
}
function attachMetricSortHandlers() {
  for (const button of view.querySelectorAll('[data-metric-sort-key]')) {
    button.addEventListener('click', () => { const key = button.dataset.metricSortKey; if (metricSort.key === key) metricSort.direction = metricSort.direction === 'asc' ? 'desc' : 'asc'; else { metricSort.key = key; metricSort.direction = key === 'player' ? 'asc' : 'desc'; } renderMainOnly(); });
  }
  for (const button of view.querySelectorAll('[data-avg-sort-key]')) {
    button.addEventListener('click', () => { const key = button.dataset.avgSortKey; if (averageMetricSort.key === key) averageMetricSort.direction = averageMetricSort.direction === 'asc' ? 'desc' : 'asc'; else { averageMetricSort.key = key; averageMetricSort.direction = 'asc'; } renderMainOnly(); });
  }
}
function renderIndicative() {
  const options = Object.keys(data.indicativeQuestions || {}).sort((a, b) => Number(a) - Number(b));
  if (!options.length) return heading('Indicative questions', 'This report needs enough quizzers to compare a top group with the rest.') + '<div class="empty">No indicative-question comparison is available.</div>';
  const topN = document.getElementById('indicativeTopSelect')?.value || options[0];
  const rows = data.indicativeQuestions[topN] || [];
  return heading(`Questions most indicative of top ${topN} vs rest`, 'Higher difference means stronger separation between the selected top group and the rest.') + table(['Answer', 'Difference', `Top ${topN}`, 'Rest'], rows, row => `<tr><td>${answerWithCategory(row)}</td><td class="num"><strong>${row.difference}</strong></td><td class="num">${row.topHits}/${row.topN}</td><td class="num">${row.restHits}/${row.restCount}</td></tr>`);
}

render();
</script>
</body>
</html>
